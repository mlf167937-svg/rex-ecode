<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Code Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- TEMA & VARIABEL WARNA --- */
        :root {
            --bg-main: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-activity: #333333;
            --bg-panel: #1e1e1e;
            --bg-tab: #2d2d2d;
            --bg-tab-active: #1e1e1e;
            --text-color: #cccccc;
            --border-color: #444444;
            --accent-color: #007acc;
        }

        /* Tema Terang */
        body.light-theme {
            --bg-main: #ffffff;
            --bg-sidebar: #f3f3f3;
            --bg-activity: #2c2c2c;
            --bg-panel: #f8f8f8;
            --bg-tab: #ececec;
            --bg-tab-active: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --accent-color: #007acc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* --- LAYOUT UTAMA --- */
        .activity-bar {
            width: 50px;
            background-color: var(--bg-activity);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            z-index: 10;
        }

        .activity-bar .top-actions, .activity-bar .bottom-actions {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .icon-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            transition: 0.2s;
            color: #858585;
        }
        .icon-btn:hover { background-color: rgba(255,255,255,0.1); color: #fff; }

        /* Warna Custom Tombol Sesuai Request */
        .btn-copy { color: #f1c40f; } /* Kuning */
        .btn-ai { color: #2ecc71; } /* Hijau */
        .btn-create { color: #3498db; } /* Biru */
        .btn-search { color: #9b59b6; } /* Ungu */
        .btn-download { color: #ecf0f1; } /* Putih */
        .btn-settings { color: #000000; background: #fff; border-radius: 50%; padding: 8px 9px;} /* Hitam di dark mode */
        body:not(.light-theme) .btn-settings { color: #000; background: #fff; }
        body.light-theme .btn-settings { color: #fff; background: #000; }

        .sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 10px; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        .file-list { flex: 1; overflow-y: auto; list-style: none; }
        .file-item { padding: 5px 15px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .file-item:hover { background-color: var(--bg-tab); }
        .file-item.active { background-color: rgba(0, 122, 204, 0.2); color: #fff; }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- TABS (Garis Merah) --- */
        .tabs-container {
            height: 35px;
            background-color: var(--bg-sidebar);
            display: flex;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }
        .tab {
            padding: 0 15px;
            background-color: var(--bg-tab);
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab.active { background-color: var(--bg-tab-active); color: var(--accent-color); border-top: 2px solid var(--accent-color); }
        .tab-close { font-size: 10px; padding: 2px; border-radius: 3px; }
        .tab-close:hover { background-color: rgba(255,0,0,0.5); color: white; }

        /* --- EDITOR AREA --- */
        .editor-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        textarea.code-editor {
            flex: 1;
            width: 100%;
            background-color: var(--bg-main);
            color: var(--text-color);
            border: none;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            resize: none;
            outline: none;
            display: none; /* Hidden by default */
        }
        
        .empty-state {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0.5;
        }
        .empty-state i { font-size: 100px; margin-bottom: 20px; opacity: 0.1; }
        .shortcut-list p { margin: 10px 0; font-size: 14px; }
        .kbd { background: rgba(128,128,128,0.2); padding: 2px 6px; border-radius: 4px; font-family: monospace; border: 1px solid #555; }

        /* --- OUTPUT PANEL --- */
        .bottom-panel {
            height: 180px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            display: flex;
            gap: 20px;
            padding: 5px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }
        .panel-tab { cursor: pointer; padding: 5px 0; border-bottom: 1px solid transparent; }
        .panel-tab.active { border-bottom-color: var(--accent-color); color: var(--text-color); }
        .panel-content { flex: 1; padding: 10px; font-family: monospace; font-size: 12px; overflow-y: auto; color: #d4d4d4; }
        body.light-theme .panel-content { color: #333; }

        /* --- POPUP / MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal h3 { margin-bottom: 15px; }
        .modal input {
            width: 100%; padding: 10px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            margin-bottom: 15px;
            outline: none;
        }
        .modal input:focus { border-color: var(--accent-color); }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn {
            padding: 8px 15px; border: none; cursor: pointer; border-radius: 4px;
            background-color: var(--bg-tab); color: var(--text-color);
        }
        .modal-btn.primary { background-color: var(--accent-color); color: white; }
    </style>
</head>
<body>

    <div class="activity-bar">
        <div class="top-actions">
            <i class="fas fa-file-medical icon-btn btn-create" title="Buat File Baru (Biru)" onclick="openModal('createFile')"></i>
            <i class="fas fa-search icon-btn btn-search" title="Cari File (Ungu)" onclick="openModal('searchFile')"></i>
            <i class="fas fa-robot icon-btn btn-ai" title="AI Groq HTML (Hijau)" onclick="openModal('aiGroq')"></i>
            <i class="fas fa-copy icon-btn btn-copy" title="Salin Isi File (Kuning)" onclick="copyFileContent()"></i>
            <i class="fas fa-download icon-btn btn-download" title="Download File (Putih)" onclick="downloadFile()"></i>
        </div>
        <div class="bottom-actions">
            <i class="fas fa-cog icon-btn btn-settings" title="Pengaturan & Tema (Hitam)" onclick="toggleTheme()"></i>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">EXPLORER</div>
        <ul class="file-list" id="fileList">
            </ul>
    </div>

    <div class="main-area">
        <div class="tabs-container" id="tabsContainer">
            </div>

        <div class="editor-container">
            <div class="empty-state" id="emptyState">
                <i class="fab fa-microsoft"></i>
                <div class="shortcut-list">
                    <p>Show All Commands &nbsp; <span class="kbd">Ctrl</span> + <span class="kbd">Shift</span> + <span class="kbd">P</span></p>
                    <p>Go to File &nbsp; <span class="kbd">Ctrl</span> + <span class="kbd">P</span></p>
                    <p>Find in Files &nbsp; <span class="kbd">Ctrl</span> + <span class="kbd">Shift</span> + <span class="kbd">F</span></p>
                    <p>Toggle Terminal &nbsp; <span class="kbd">Ctrl</span> + <span class="kbd">`</span></p>
                </div>
            </div>
            <textarea class="code-editor" id="codeEditor" spellcheck="false" oninput="saveCurrentFile()"></textarea>
        </div>

        <div class="bottom-panel">
            <div class="panel-header">
                <div class="panel-tab">PROBLEMS</div>
                <div class="panel-tab active">OUTPUT</div>
                <div class="panel-tab">DEBUG CONSOLE</div>
                <div class="panel-tab">TERMINAL</div>
            </div>
            <div class="panel-content" id="outputPanel">
                [Sistem] Menunggu perintah...
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">Judul</h3>
            <input type="text" id="modalInput" placeholder="Ketik di sini...">
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeModal()">Batal</button>
                <button class="modal-btn primary" onclick="submitModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Data State
        let files = {
            "index.html": "<h1>Hello World</h1>",
            "style.css": "body { margin: 0; }",
            "app.js": "console.log('Ready');"
        };
        let openTabs = [];
        let activeFile = null;
        let currentModalAction = null;

        // Inisialisasi awal
        renderFileList();
        logOutput("Ekstensi host berhasil dimuat. Siap digunakan.");

        // --- MANAJEMEN FILE & TAB ---
        function renderFileList(filterQuery = "") {
            const list = document.getElementById("fileList");
            list.innerHTML = "";
            Object.keys(files).forEach(fileName => {
                if (fileName.toLowerCase().includes(filterQuery.toLowerCase())) {
                    const li = document.createElement("li");
                    li.className = "file-item" + (fileName === activeFile ? " active" : "");
                    li.innerHTML = `<i class="far fa-file-code"></i> ${fileName}`;
                    li.onclick = () => openFile(fileName);
                    list.appendChild(li);
                }
            });
        }

        function renderTabs() {
            const container = document.getElementById("tabsContainer");
            container.innerHTML = "";
            openTabs.forEach(fileName => {
                const tab = document.createElement("div");
                tab.className = "tab" + (fileName === activeFile ? " active" : "");
                tab.innerHTML = `
                    <i class="far fa-file-code" style="color:#e34c26"></i> 
                    ${fileName} 
                    <i class="fas fa-times tab-close" onclick="closeTab(event, '${fileName}')"></i>
                `;
                tab.onclick = () => openFile(fileName);
                container.appendChild(tab);
            });
        }

        function openFile(fileName) {
            if (!openTabs.includes(fileName)) {
                openTabs.push(fileName);
            }
            activeFile = fileName;
            
            document.getElementById("emptyState").style.display = "none";
            const editor = document.getElementById("codeEditor");
            editor.style.display = "block";
            editor.value = files[fileName];
            
            renderFileList();
            renderTabs();
            logOutput(`Membuka file: ${fileName}`);
        }

        function closeTab(event, fileName) {
            event.stopPropagation();
            openTabs = openTabs.filter(t => t !== fileName);
            if (activeFile === fileName) {
                activeFile = openTabs.length > 0 ? openTabs[openTabs.length - 1] : null;
            }
            
            if (!activeFile) {
                document.getElementById("emptyState").style.display = "flex";
                document.getElementById("codeEditor").style.display = "none";
            } else {
                openFile(activeFile);
            }
            renderTabs();
            renderFileList();
        }

        function saveCurrentFile() {
            if (activeFile) {
                files[activeFile] = document.getElementById("codeEditor").value;
            }
        }

        // --- FUNGSI TOMBOL (WARNA) ---

        // 1. Tombol Biru: Create File
        function createFile(fileName) {
            if (fileName && !files[fileName]) {
                files[fileName] = "";
                openFile(fileName);
                logOutput(`File baru dibuat: ${fileName}`);
            } else if (files[fileName]) {
                alert("File sudah ada!");
            }
        }

        // 2. Tombol Ungu: Search
        function searchFile(query) {
            renderFileList(query);
            logOutput(`Mencari file dengan kata kunci: "${query}"`);
        }

        // 3. Tombol Hijau: AI Groq HTML
        function triggerAIGroq(prompt) {
            logOutput(`[AI Groq] Memproses permintaan: "${prompt}"...`);
            setTimeout(() => {
                const aiResponse = `\n<div>\n  <p>Response for: ${prompt}</p>\n</div>`;
                if(activeFile) {
                    files[activeFile] += "\n" + aiResponse;
                    document.getElementById("codeEditor").value = files[activeFile];
                    logOutput(`[AI Groq] Kode ditambahkan ke ${activeFile}`);
                } else {
                    files["ai_generated.html"] = aiResponse;
                    openFile("ai_generated.html");
                    logOutput(`[AI Groq] File ai_generated.html dibuat.`);
                }
            }, 1000);
        }

        // 4. Tombol Kuning: Copy
        function copyFileContent() {
            if (!activeFile) {
                alert("Buka file terlebih dahulu untuk menyalin!");
                return;
            }
            const editor = document.getElementById("codeEditor");
            editor.select();
            document.execCommand("copy");
            logOutput(`[Salin] Isi file ${activeFile} disalin ke clipboard.`);
            alert("Isi file disalin!");
        }

        // 5. Tombol Putih: Download
        function downloadFile() {
            if (!activeFile) {
                alert("Tidak ada file yang aktif untuk diunduh!");
                return;
            }
            const blob = new Blob([files[activeFile]], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = activeFile;
            a.click();
            window.URL.revokeObjectURL(url);
            logOutput(`[Download] File ${activeFile} berhasil diunduh.`);
        }

        // 6. Tombol Hitam: Toggle Theme
        function toggleTheme() {
            document.body.classList.toggle("light-theme");
            logOutput("Tema aplikasi diubah.");
        }

        // --- SISTEM POPUP / MODAL ---
        function openModal(action) {
            const overlay = document.getElementById("modalOverlay");
            const title = document.getElementById("modalTitle");
            const input = document.getElementById("modalInput");
            
            input.value = "";
            currentModalAction = action;
            overlay.style.display = "flex";
            input.focus();

            if (action === "createFile") {
                title.innerText = "Buat File Baru";
                input.placeholder = "Contoh: index.html";
            } else if (action === "searchFile") {
                title.innerText = "Cari File";
                input.placeholder = "Nama file yang dicari...";
            } else if (action === "aiGroq") {
                title.innerText = "HTML AI Groq Prompt";
                input.placeholder = "Apa yang ingin AI buat untuk Anda?";
            }
        }

        function closeModal() {
            document.getElementById("modalOverlay").style.display = "none";
        }

        function submitModal() {
            const val = document.getElementById("modalInput").value.trim();
            closeModal();
            if (!val) return;

            if (currentModalAction === "createFile") createFile(val);
            if (currentModalAction === "searchFile") searchFile(val);
            if (currentModalAction === "aiGroq") triggerAIGroq(val);
        }

        // --- OUTPUT PANEL LOGGING ---
        function logOutput(msg) {
            const panel = document.getElementById("outputPanel");
            const time = new Date().toLocaleTimeString();
            panel.innerHTML += `<br>[${time}] [info] ${msg}`;
            panel.scrollTop = panel.scrollHeight;
        }

        // Keyboard Shortcut Tambahan
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'p') { e.preventDefault(); openModal('searchFile'); }
            if (e.ctrlKey && e.key === '`') { 
                e.preventDefault(); 
                const panel = document.querySelector('.bottom-panel');
                panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
            }
        });
    </script>
</body>
</html>
