<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RexEditorCode - Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <style>
        :root {
            --bg-main: #1e1e1e; --bg-sidebar: #252526; --bg-activity: #333333;
            --text-color: #cccccc; --border-color: #3c3c3c; --accent-color: #007acc; --ai-color: #f1c40f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-main); color: var(--text-color); height: 100vh; overflow: hidden; display: flex; }

        /* Overlay Deteksi HP Portrait */
        #landscape-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #1e1e1e; z-index: 99999; color: white; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        @media screen and (max-width: 900px) and (orientation: portrait) {
            #landscape-warning { display: flex; }
        }

        /* Activity Bar Kiri */
        .activity-bar { width: 48px; background: var(--bg-activity); display: flex; flex-direction: column; align-items: center; padding: 10px 0; border-right: 1px solid var(--border-color); }
        .icon-btn { font-size: 20px; cursor: pointer; padding: 14px 0; width: 100%; text-align: center; color: #858585; }
        .icon-btn:hover, .icon-btn.active { color: #fff; }
        .btn-ai { color: var(--ai-color); }

        /* Sidebar Proyek */
        .sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px 15px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
        .file-list { list-style: none; overflow-y: auto; flex: 1; }
        .file-item { padding: 6px 15px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .file-item:hover, .file-item.active { background: #37373d; color: #fff; }
        
        /* Main Space + Split Editor Container */
        .main-workspace { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .tabs-container { height: 35px; background: #252526; display: flex; border-bottom: 1px solid var(--border-color); }
        .tab { padding: 0 15px; display: flex; align-items: center; gap: 8px; font-size: 13px; background: #2d2d2d; cursor: pointer; border-right: 1px solid var(--border-color); color: #969696; }
        .tab.active { background: var(--bg-main); color: #fff; border-top: 2px solid var(--accent-color); }
        
        .editors-layout { flex: 1; display: flex; min-height: 0; background: #161616; gap: 2px; }
        .editor-pane { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); min-width: 0; }
        .pane-header { background: #222; padding: 4px 10px; font-size: 11px; color: #858585; text-transform: uppercase; border-bottom: 1px solid #2d2d2d; }
        .monaco-frame { flex: 1; width: 100%; height: 100%; }

        /* Bottom Terminal */
        .terminal-panel { height: 150px; background: var(--bg-main); border-top: 1px solid var(--border-color); padding: 10px 15px; font-family: monospace; font-size: 12px; overflow-y: auto; color: #d4d4d4; }
    </style>
</head>
<body>

    <div id="landscape-warning">
        <i class="fas fa-mobile-alt" style="font-size: 50px; color: #f1c40f; margin-bottom: 15px;"></i>
        <h2>Harap Putar Layar HP Anda</h2>
        <p>Gunakan mode landscape (horizontal) demi kenyamanan coding terbaik di RexEditorCode.</p>
    </div>

    <div class="activity-bar">
        <i class="fas fa-file-medical icon-btn" title="Buat File Baru" onclick="createNewFile()"></i>
        <i class="fas fa-file-excel icon-btn" style="color: #e74c3c;" title="Hapus File Aktif" onclick="deleteActiveFile()"></i>
        <i class="fas fa-search icon-btn" title="Pencarian File" onclick="searchFiles()"></i>
        <i class="fas fa-play icon-btn" style="color: #89d185;" title="Run Code (AI)" onclick="runActiveCode()"></i>
        <i class="fas fa-columns icon-btn" title="Toggle Mode Dua Layar (Split View)" onclick="toggleSplitView()"></i>
        <i class="fas fa-robot icon-btn btn-ai" title="Buka Asisten AI Global" onclick="window.location.href='ai.html'"></i>
        <i class="fas fa-sign-out-alt icon-btn" style="margin-top: auto;" title="Keluar / Ganti API" onclick="window.location.href='login.html'"></i>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Workspace Files</div>
        <ul class="file-list" id="fileList"></ul>
    </div>

    <div class="main-workspace">
        <div class="tabs-container" id="tabsBox"></div>
        
        <div class="editors-layout">
            <div class="editor-pane" id="paneLeft">
                <div class="pane-header">Layar Editor Utama</div>
                <div id="editorLeft" class="monaco-frame"></div>
            </div>
            <div class="editor-pane" id="paneRight" style="display: none;">
                <div class="pane-header">Layar Editor Kedua (Split View)</div>
                <div id="editorRight" class="monaco-frame"></div>
            </div>
        </div>

        <div class="terminal-panel" id="terminalBox">PS C:\RexEditorCode> Selamat datang kembali. Terminal siap digunakan...</div>
    </div>

    <script>
        const provider = localStorage.getItem('rex_provider') || 'none';
        const apiKey = localStorage.getItem('rex_key') || '';

        let files = JSON.parse(localStorage.getItem('rex_project_files')) || {
            "main.py": { lang: "python", code: "print('Halo dari RexEditorCode!')\n# Coba buat file baru atau aktifkan split view." },
            "index.html": { lang: "html", code: "<h1>Halo Dunia</h1>" }
        };
        let activeFile = Object.keys(files)[0] || "";
        let editorL, editorR;
        let isSplitMode = false;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editorL = monaco.editor.create(document.getElementById('editorLeft'), {
                value: files[activeFile] ? files[activeFile].code : "",
                language: files[activeFile] ? files[activeFile].lang : "plaintext",
                theme: 'vs-dark', automaticLayout: true
            });

            editorR = monaco.editor.create(document.getElementById('editorRight'), {
                value: "", language: "plaintext", theme: 'vs-dark', automaticLayout: true
            });

            editorL.onDidChangeModelContent(() => {
                if(activeFile && files[activeFile]) {
                    files[activeFile].code = editorL.getValue();
                    localStorage.setItem('rex_project_files', JSON.stringify(files));
                }
            });

            renderSidebar();
        });

        function renderSidebar() {
            const list = document.getElementById('fileList');
            const tabs = document.getElementById('tabsBox');
            list.innerHTML = ""; tabs.innerHTML = "";

            Object.keys(files).forEach(name => {
                const li = document.createElement('li');
                li.className = `file-item ${name === activeFile ? 'active' : ''}`;
                li.innerHTML = `<i class="far fa-file-code"></i> ${name}`;
                li.onclick = () => selectFile(name);
                list.appendChild(li);

                if(name === activeFile) {
                    tabs.innerHTML = `<div class="tab active"><i class="far fa-file-code"></i> ${name}</div>`;
                }
            });
        }

        function selectFile(name) {
            activeFile = name;
            monaco.editor.setModelLanguage(editorL.getModel(), files[name].lang);
            editorL.setValue(files[name].code);
            renderSidebar();
        }

        function createNewFile() {
            const name = prompt("Masukkan nama file beserta ekstensi (contoh: app.js, index.html):");
            if(!name) return;
            let ext = name.split('.').pop();
            let lang = ext === 'py' ? 'python' : ext === 'js' ? 'javascript' : ext === 'html' ? 'html' : 'plaintext';
            
            files[name] = { lang: lang, code: "" };
            localStorage.setItem('rex_project_files', JSON.stringify(files));
            selectFile(name);
        }

        function deleteActiveFile() {
            if(!activeFile) return;
            if(confirm(`Apakah Anda yakin ingin menghapus file ${activeFile}?`)) {
                delete files[activeFile];
                localStorage.setItem('rex_project_files', JSON.stringify(files));
                activeFile = Object.keys(files)[0] || "";
                if(activeFile) selectFile(activeFile);
                else { editorL.setValue(""); renderSidebar(); }
            }
        }

        function toggleSplitView() {
            isSplitMode = !isSplitMode;
            const paneR = document.getElementById('paneRight');
            if(isSplitMode) {
                paneR.style.display = "flex";
                editorR.setValue("// Masukkan kode sekunder di sini untuk perbandingan...");
                monaco.editor.setModelLanguage(editorR.getModel(), "javascript");
            } else {
                paneR.style.display = "none";
            }
        }

        function searchFiles() {
            const query = prompt("Masukkan nama file yang dicari:");
            if(!query) return;
            const found = Object.keys(files).find(n => n.toLowerCase().includes(query.toLowerCase()));
            if(found) selectFile(found);
            else alert("File tidak ditemukan di dalam Workspace!");
        }

        async function runActiveCode() {
            if(!activeFile) return;
            if(provider === 'none') {
                document.getElementById('terminalBox').innerHTML += `<br><span style="color:#e74c3c;">[ERROR] Anda masuk tanpa AI. Fitur Eksekusi Code dinonaktifkan.</span>`;
                return;
            }

            document.getElementById('terminalBox').innerHTML += `<br><span style="color:#f1c40f;">[RUNNING] Meminta hasil eksekusi dari AI (${provider})...</span>`;
            
            try {
// Pastikan baris pemanggilan fetch di dalam fungsi runActiveCode Anda diubah menjadi seperti ini:
               const res = await fetch('/api/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider, apiKey, code: editorL.getValue(), language: files[activeFile].lang })
            });
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                document.getElementById('terminalBox').innerHTML += `<br><span style="color:#2ecc71;">${data.output.replace(/\n/g, '<br>')}</span>`;
            } catch(err) {
                document.getElementById('terminalBox').innerHTML += `<br><span style="color:#e74c3c;">[ERROR] ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
