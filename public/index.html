<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rex eCode Pro - Virtual Compiler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

    <style>
        :root {
            --bg-activity: #181818;
            --bg-sidebar: #202020;
            --bg-editor: #1e1e1e;
            --border-color: #333;
            --text-main: #cccccc;
            --text-active: #ffffff;
            --accent: #007acc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-editor);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Responsive Layouting */
        .activity-bar {
            width: 50px;
            background-color: var(--bg-activity);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            z-index: 20;
        }

        .activity-icon {
            padding: 15px 0;
            text-align: center;
            font-size: 20px;
            color: #858585;
            cursor: pointer;
        }
        .activity-icon.active { color: var(--text-active); border-left: 2px solid var(--accent); }

        .sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - 300px);
        }

        /* Mobile View Adjustments */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 50px;
                height: 100vh;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                box-shadow: 5px 0 10px rgba(0,0,0,0.5);
            }
            .sidebar.show { transform: translateX(0); }
            .main-content { width: calc(100% - 50px); }
        }

        .sidebar-header { padding: 12px 15px; font-size: 11px; text-transform: uppercase; color: #999; }
        
        .file-list { flex-grow: 1; overflow-y: auto; list-style: none; }
        .file-item { padding: 8px 15px; cursor: pointer; display: flex; gap: 8px; font-size: 13px; }
        .file-item.active { background-color: #37373d; color: white; }
        
        .config-box { padding: 15px; border-top: 1px solid var(--border-color); }
        .config-box input { width: 100%; padding: 8px; background: #333; color: white; border: none; outline: none; margin-top: 5px; border-radius: 4px; }

        .editor-header {
            height: 40px;
            background-color: var(--bg-sidebar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .btn-run {
            background-color: #1e4620;
            color: #4af626;
            border: 1px solid #2a5a2b;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-run:hover { background-color: #265928; }

        .editor-container { flex-grow: 1; }

        /* --- MODAL POP-UP TERMINAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: #1e1e1e;
            width: 90%;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 12px 15px;
            background: #252526;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            color: #fff;
        }

        .modal-close {
            background: transparent;
            color: #ff5f56;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .modal-body {
            padding: 15px;
            background: #000;
            color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            min-height: 150px;
            max-height: 60vh;
            overflow-y: auto;
            border-radius: 0 0 8px 8px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .loading-text { color: #f39c12; }
        .error-text { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="activity-bar">
        <div class="activity-icon active" onclick="toggleSidebar()"><i class="fa-regular fa-copy"></i></div>
        <div class="activity-icon" onclick="toggleSidebar()"><i class="fa-solid fa-gear"></i></div>
    </div>

    <div class="sidebar" id="appSidebar">
        <div class="sidebar-header">Explorer</div>
        <ul id="fileList" class="file-list"></ul>
        <div class="config-box">
            <label style="font-size: 11px; color:#999;">GROQ API KEY (WAJIB)</label>
            <input type="password" id="groqApiKey" placeholder="gsk_..." onchange="saveApiKey()">
        </div>
    </div>

    <div class="main-content">
        <div class="editor-header">
            <span id="currentFileName" style="font-size: 13px; color: #fff;">main.py</span>
            <button class="btn-run" onclick="runVirtualCompiler()"><i class="fa-solid fa-play"></i> Run</button>
        </div>
        <div id="editorContainer" class="editor-container"></div>
    </div>

    <!-- MODAL POP-UP OUTPUT -->
    <div class="modal-overlay" id="outputModal">
        <div class="modal-content">
            <div class="modal-header">
                <span><i class="fa-solid fa-terminal"></i> Terminal Output</span>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="terminalOutput"></div>
        </div>
    </div>

    <script>
        let editor;
        let files = JSON.parse(localStorage.getItem('rexIdeFiles')) || {
            "main.py": 'nama = "Programmer"\nprint(f"Halo {nama}, program berjalan dengan baik!")\n\n# Coba buat error buatan di bawah ini untuk tes AI:\n# print(1/0)',
            "app.js": 'console.log("Eksekusi JavaScript berhasil!");'
        };
        let currentFile = "main.py";

        // Inisialisasi API Key
        document.getElementById('groqApiKey').value = localStorage.getItem('groqApiKey') || '';
        function saveApiKey() { localStorage.setItem('groqApiKey', document.getElementById('groqApiKey').value); }

        // Sidebar Toggle untuk Mobile
        function toggleSidebar() {
            document.getElementById('appSidebar').classList.toggle('show');
        }

        // Setup Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: files[currentFile],
                language: getLanguage(currentFile),
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14
            });

            editor.onDidChangeModelContent(() => {
                files[currentFile] = editor.getValue();
                localStorage.setItem('rexIdeFiles', JSON.stringify(files));
            });
            updateFileList();
        });

        function getLanguage(filename) {
            if(filename.endsWith('.py')) return 'python';
            if(filename.endsWith('.js')) return 'javascript';
            if(filename.endsWith('.cpp')) return 'cpp';
            if(filename.endsWith('.php')) return 'php';
            return 'plaintext';
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            Object.keys(files).forEach(name => {
                const li = document.createElement('li');
                li.className = `file-item ${currentFile === name ? 'active' : ''}`;
                li.innerHTML = `<i class="fa-solid fa-file-code"></i> ${name}`;
                li.onclick = () => {
                    currentFile = name;
                    document.getElementById('currentFileName').innerText = name;
                    editor.setValue(files[name]);
                    monaco.editor.setModelLanguage(editor.getModel(), getLanguage(name));
                    updateFileList();
                    if(window.innerWidth <= 768) toggleSidebar(); // auto close on mobile
                };
                list.appendChild(li);
            });
        }

        // Logika Pop-up Modal
        const modal = document.getElementById('outputModal');
        const termOut = document.getElementById('terminalOutput');

        function closeModal() { modal.style.display = 'none'; }

        async function runVirtualCompiler() {
            const apiKey = document.getElementById('groqApiKey').value;
            if (!apiKey) {
                alert("Harap masukkan API Key Groq di pengaturan sidebar terlebih dahulu!");
                if(window.innerWidth <= 768) toggleSidebar();
                return;
            }

            const code = editor.getValue();
            const language = getLanguage(currentFile);

            // Buka Modal & Tampilkan Loading
            modal.style.display = 'flex';
            termOut.innerHTML = `<span class="loading-text">Membangun virtual environment untuk ${language}...<br>Menjalankan kode... ⏳</span>`;

            try {
                // Request ke Backend Render.com kita (server.js)
                const res = await fetch('/api/run-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, language, apiKey })
                });

                const data = await res.json();

                if (res.ok) {
                    termOut.textContent = data.output; // Tampilkan murni tanpa HTML render
                } else {
                    termOut.innerHTML = `<span class="error-text">FATAL ERROR: ${data.error}</span>`;
                }
            } catch (err) {
                termOut.innerHTML = `<span class="error-text">SERVER ERROR: Tidak dapat terhubung ke server backend Render.com.</span>`;
            }
        }
    </script>
</body>
</html>
