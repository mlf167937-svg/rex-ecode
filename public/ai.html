<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex AI Assistant Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1e1e1e; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .ai-header { background: #252526; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c3c3c; }
        .ai-header h2 { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #1c1c1c; }
        .bubble { padding: 12px 16px; border-radius: 6px; max-width: 80%; line-height: 1.5; font-size: 14px; }
        .bubble.user { background: #007acc; align-self: flex-end; color: white; }
        .bubble.ai { background: #2d2d2d; align-self: flex-start; border: 1px solid #3c3c3c; color: #ddd; }
        .input-bar { background: #252526; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #3c3c3c; }
        input { flex: 1; padding: 12px; background: #1e1e1e; border: 1px solid #3c3c3c; color: white; border-radius: 4px; outline: none; }
        input:focus { border-color: #007acc; }
        .btn { padding: 0 20px; background: #007acc; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #005f9e; }
    </style>
</head>
<body>

    <div class="ai-header">
        <h2><i class="fas fa-robot" style="color:#f1c40f;"></i> Rex AI Chat Assistant Panel</h2>
        <button onclick="window.location.href='index.html'" style="background:none; border:1px solid #555; color:#ccc; padding:6px 12px; cursor:pointer; border-radius:3px;">Kembali ke Editor</button>
    </div>

    <div class="chat-container" id="chatArea">
        <div class="bubble ai">Halo! Saya adalah sistem kecerdasan buatan Rex AI. Tanyakan apa saja seputar pembuatan aplikasi atau perbaikan bug script Anda.</div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Ketik pesan atau pertanyaan program disini..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
        <button class="btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const provider = localStorage.getItem('rex_provider') || 'none';
        const apiKey = localStorage.getItem('rex_key') || '';

        async function sendChatMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if(!message) return;

            if(provider === 'none') {
                alert("Anda sedang berada dalam mode offline tanpa AI. Silakan kembali ke halaman login untuk mengisi API Key.");
                return;
            }

            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML += `<div class="bubble user">${message}</div>`;
            input.value = "";
            chatArea.scrollTop = chatArea.scrollHeight;

            const targetId = "ai-" + Date.now();
            chatArea.innerHTML += `<div class="bubble ai" id="${targetId}"><i class="fas fa-spinner fa-spin"></i> Sedang berpikir...</div>`;
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provider, apiKey, message })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById(targetId).innerHTML = data.reply.replace(/\n/g, '<br>');
            } catch(err) {
                document.getElementById(targetId).innerText = "Terjadi masalah koneksi atau token API salah: " + err.message;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
